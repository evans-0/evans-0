name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    name: Generate Stats SVGs
    runs-on: ubuntu-latest

    steps:
      - name: Stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: evans-0
          filename: assets/stats.svg
          template: classic
          base: header, activity, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          config_theme: tokyonight
          
      - name: Top languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: evans-0
          filename: assets/top-langs.svg
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          config_theme: tokyonight
