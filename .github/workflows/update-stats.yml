name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"   # refresh every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    name: Fetch & Cache Stats SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch stats cards
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          curl -sf "https://github-readme-stats.vercel.app/api?username=evans-0&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&cache_seconds=1" \
            -o assets/stats.svg

          curl -sf "https://github-readme-stats.vercel.app/api/top-langs?username=evans-0&layout=compact&langs_count=8&theme=tokyonight&hide_border=true&cache_seconds=1" \
            -o assets/top-langs.svg

      - name: Commit updated cards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || \
            git commit -m "chore: refresh GitHub stats cards [skip ci]" && git push
